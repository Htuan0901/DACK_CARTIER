<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tài khoản Người dùng - Cartier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Open Sans', sans-serif;
      background: #f8f4ef;
      color: #5c3a1e;
      min-height: 100vh;
    }
    .user-topbar {
      background: #fff;
      border-bottom: 3px solid #8B4513;
      padding: 16px 0;
    }
    .user-topbar .brand {
      font-weight: 700;
      color: #8B4513;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-decoration: none;
    }
    .user-badge {
      background: #f5ebe0;
      color: #8B4513;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .welcome-banner {
      background: linear-gradient(135deg, #8B4513, #a0522d);
      color: #fff;
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .stat-mini {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      height: 100%;
    }
    .stat-mini .num {
      font-size: 1.8rem;
      font-weight: 700;
      color: #8B4513;
    }
    .quick-action {
      display: block;
      background: #fff;
      border: 2px solid #e8ddd0;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      text-decoration: none;
      color: #5c3a1e;
      transition: all 0.2s;
      height: 100%;
    }
    .quick-action:hover {
      border-color: #8B4513;
      color: #8B4513;
      transform: translateY(-2px);
    }
    .quick-action i {
      font-size: 1.8rem;
      color: #8B4513;
      margin-bottom: 8px;
    }
    .orders-table {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .btn-logout {
      background: transparent;
      border: 1px solid #8B4513;
      color: #8B4513;
      font-weight: 600;
    }
    .btn-logout:hover {
      background: #8B4513;
      color: #fff;
    }
  </style>
</head>
<body data-require-auth="user">
  <header class="user-topbar">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <a href="trangchu.html" class="brand"><i class="fas fa-gem me-2"></i>Cartier</a>
        <span class="user-badge ms-2">Người dùng</span>
      </div>
      <div class="d-flex align-items-center gap-3">
        <span class="small text-muted">Xin chào, <strong id="guard-user-email"></strong></span>
        <button type="button" class="btn btn-sm btn-logout" id="user-logout-btn">Đăng xuất</button>
      </div>
    </div>
  </header>

  <main class="container py-4">
    <div class="welcome-banner">
      <h1 class="h4 mb-1">Trang cá nhân</h1>
      <p class="mb-0 opacity-75">Theo dõi đơn hàng, tiếp tục mua sắm trang sức Cartier</p>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="stat-mini">
          <div class="num" id="user-order-count">0</div>
          <div class="text-muted small">Đơn hàng của bạn</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-mini">
          <div class="num" id="user-total-spent">$0</div>
          <div class="text-muted small">Tổng chi tiêu</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-mini">
          <div class="num" id="user-cart-count">0</div>
          <div class="text-muted small">Sản phẩm trong giỏ</div>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-3 col-6">
        <a href="trangchu.html" class="quick-action">
          <i class="fas fa-store d-block"></i>
          Cửa hàng
        </a>
      </div>
      <div class="col-md-3 col-6">
        <a href="search.html" class="quick-action">
          <i class="fas fa-search d-block"></i>
          Tìm sản phẩm
        </a>
      </div>
      <div class="col-md-3 col-6">
        <a href="giohang.html" class="quick-action">
          <i class="fas fa-shopping-bag d-block"></i>
          Giỏ hàng
        </a>
      </div>
      <div class="col-md-3 col-6">
        <a href="thanhtoan.html" class="quick-action">
          <i class="fas fa-credit-card d-block"></i>
          Thanh toán
        </a>
      </div>
    </div>

    <div class="orders-table">
      <h2 class="h5 mb-3"><i class="fas fa-receipt me-2"></i>Lịch sử đơn hàng</h2>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Mã đơn</th>
              <th>Ngày</th>
              <th>Sản phẩm</th>
              <th>Tổng</th>
              <th>Trạng thái</th>
            </tr>
          </thead>
          <tbody id="user-orders-body">
            <tr><td colspan="5" class="text-center text-muted">Chưa có đơn hàng</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth-guard.js"></script>
  <script src="data-store.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const session = JSON.parse(localStorage.getItem('session') || 'null');
      const email = session && session.email ? session.email.toLowerCase() : '';

      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const cartQty = cart.reduce((s, i) => s + (i.quantity || 1), 0);
      document.getElementById('user-cart-count').textContent = cartQty;

      const myOrders = window.DataStore.getOrders().filter(o =>
        (o.userEmail || '').toLowerCase() === email
      );

      const spent = myOrders.reduce((s, o) => s + (Number(o.total) || 0), 0);
      document.getElementById('user-order-count').textContent = myOrders.length;
      document.getElementById('user-total-spent').textContent = '$' + spent.toFixed(2);

      const tbody = document.getElementById('user-orders-body');
      if (myOrders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">Bạn chưa có đơn hàng. <a href="trangchu.html">Mua sắm ngay</a></td></tr>';
      } else {
        tbody.innerHTML = myOrders.map(o => {
          const d = new Date(o.createdAt);
          const items = (o.items || []).map(i => i.name).join(', ');
          return `<tr>
            <td><code>${o.id}</code></td>
            <td>${d.toLocaleDateString('vi-VN')}</td>
            <td class="small">${items || '—'}</td>
            <td><strong>$${Number(o.total).toFixed(2)}</strong></td>
            <td><span class="badge bg-success">${o.status || 'completed'}</span></td>
          </tr>`;
        }).join('');
      }

      document.getElementById('user-logout-btn').addEventListener('click', () => {
        localStorage.removeItem('session');
        window.location.href = 'dangnhap-nguoidung.html';
      });
    });
  </script>
</body>
</html>
