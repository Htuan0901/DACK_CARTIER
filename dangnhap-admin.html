<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đăng nhập Admin - Cartier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #1a252f, #2c3e50);
      color: #ecf0f1;
    }
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      color: #2c3e50;
      border-radius: 14px;
      padding: 40px 36px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
      border-top: 4px solid #3498db;
    }
    .auth-badge {
      display: inline-block;
      background: #eaf4fb;
      color: #2980b9;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .auth-card h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .auth-hint {
      font-size: 0.85rem;
      color: #7f8c8d;
      margin-bottom: 20px;
    }
    label { font-weight: 600; font-size: 0.9rem; }
    .form-control { margin-bottom: 14px; }
    .form-control:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.2);
    }
    #login-btn {
      background: #2c3e50;
      border: none;
      width: 100%;
      padding: 10px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    #login-btn:hover { background: #1a252f; }
    #signup-btn {
      background: transparent;
      border: 2px solid #2c3e50;
      color: #2c3e50;
      width: 100%;
      padding: 10px;
      font-weight: 600;
    }
    #logout-btn, #go-dashboard-btn {
      width: 100%;
      margin-top: 8px;
      font-weight: 600;
    }
    #go-dashboard-btn {
      background: #3498db;
      border: none;
      color: #fff;
      padding: 10px;
      display: none;
    }
    .auth-links {
      margin-top: 20px;
      font-size: 0.88rem;
      text-align: center;
    }
    .auth-links a { color: #2980b9; }
  </style>
</head>
<body data-auth-role="admin" data-auth-page="login">
  <div class="auth-wrap">
    <div class="auth-card">
      <span class="auth-badge"><i class="fas fa-shield-alt me-1"></i> Quản trị</span>
      <h2>Admin Dashboard</h2>
      <p class="auth-hint">Chỉ dành cho quản trị viên — thống kê & báo cáo bán hàng</p>
      <label for="email">Email admin</label>
      <input type="email" id="email" class="form-control" placeholder="admin@cartier.com" />
      <label for="password">Mật khẩu</label>
      <input type="password" id="password" class="form-control" />
      <button type="button" id="login-btn" class="btn btn-dark">Đăng nhập Admin</button>
      <button type="button" id="signup-btn" class="btn">Tạo tài khoản Admin (demo)</button>
      <button type="button" id="go-dashboard-btn" class="btn">Vào Dashboard</button>
      <button type="button" id="logout-btn" class="btn btn-secondary" style="display:none;">Đăng xuất</button>
      <p id="current-user-info" class="mt-3 small text-muted text-center"></p>
      <div class="auth-links">
        <a href="dangnhap.html">← Chọn loại tài khoản</a> ·
        <a href="dangnhap-nguoidung.html">Đăng nhập Người dùng</a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth.js"></script>
</body>
</html>
