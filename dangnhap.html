<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chọn loại tài khoản - Cartier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8f4ef 0%, #efe4d4 100%);
      color: #5c3a1e;
      display: flex;
      flex-direction: column;
    }
    .portal-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .portal-card {
      max-width: 900px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(92, 58, 30, 0.12);
      padding: 48px 32px;
      text-align: center;
    }
    .portal-logo {
      width: 90px;
      margin-bottom: 12px;
    }
    .portal-title {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8B4513;
      margin-bottom: 8px;
    }
    .portal-sub {
      color: #888;
      margin-bottom: 36px;
    }
    .role-card {
      border: 2px solid #e8ddd0;
      border-radius: 12px;
      padding: 32px 24px;
      height: 100%;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .role-card:hover {
      transform: translateY(-4px);
      border-color: #8B4513;
      box-shadow: 0 8px 24px rgba(139, 69, 19, 0.15);
      color: inherit;
    }
    .role-card.admin:hover {
      border-color: #2c3e50;
    }
    .role-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
      color: #8B4513;
    }
    .role-card.admin .role-icon {
      color: #2c3e50;
    }
    .role-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .role-card p {
      font-size: 0.9rem;
      color: #666;
      margin: 0;
    }
    .back-shop {
      margin-top: 28px;
      color: #8B4513;
      text-decoration: none;
      font-weight: 600;
    }
    .back-shop:hover { color: #654321; }
  </style>
</head>
<body>
  <div class="portal-wrap">
    <div class="portal-card">
      <img src="test/Logo.png" alt="Cartier" class="portal-logo" />
      <h1 class="portal-title">Cartier</h1>
      <p class="portal-sub">Chọn khu vực đăng nhập phù hợp với vai trò của bạn</p>
      <div class="row g-4">
        <div class="col-md-6">
          <a href="dangnhap-nguoidung.html" class="role-card">
            <div class="role-icon"><i class="fas fa-user"></i></div>
            <h3>Người dùng</h3>
            <p>Mua sắm trang sức, quản lý giỏ hàng và đơn hàng cá nhân</p>
          </a>
        </div>
        <div class="col-md-6">
          <a href="dangnhap-admin.html" class="role-card admin">
            <div class="role-icon"><i class="fas fa-chart-line"></i></div>
            <h3>Quản trị (Admin)</h3>
            <p>Dashboard thống kê, doanh thu và quản lý dữ liệu bán hàng</p>
          </a>
        </div>
      </div>
      <a href="trangchu.html" class="back-shop d-inline-block"><i class="fas fa-store me-1"></i> Tiếp tục xem cửa hàng không cần đăng nhập</a>
    </div>
  </div>
</body>
</html>
